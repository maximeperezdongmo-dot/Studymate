<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyMate - Secrétaire IA pour étudiants</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
body { background: #0F0F1A; color: #E8E8F0; min-height: 100vh; }
.header { background: #16172A; padding: 16px 20px; border-bottom: 1px solid #2A2D4A; display: flex; align-items: center; gap: 10px; }
.header h1 { font-size: 20px; }
.header p { font-size: 11px; color: #7B7D9E; }
.container { padding: 20px; max-width: 700px; margin: 0 auto; }
.card { background: #1E2038; border: 1px solid #2A2D4A; border-radius: 14px; padding: 20px; margin-bottom: 20px; }
textarea, input { width: 100%; padding: 12px; background: #16172A; border: 1px solid #2A2D4A; border-radius: 10px; color: #E8E8F0; font-size: 14px; outline: none; font-family: sans-serif; box-sizing: border-box; }
textarea { min-height: 100px; resize: vertical; }
button { width: 100%; padding: 14px; background: #6C63FF; border: none; border-radius: 10px; color: white; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 12px; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.tag { display: inline-block; padding: 4px 12px; border-radius: 20px; background: #6C63FF22; color: #8B85FF; font-size: 12px; margin: 4px; }
.step { padding: 12px; border: 1px solid #2A2D4A; border-radius: 10px; margin-bottom: 8px; }
.result { display: none; }
.loading { display: none; text-align: center; padding: 20px; color: #7B7D9E; }
label { display: block; font-size: 12px; color: #7B7D9E; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.5px; }
.chat-box { height: 300px; overflow-y: auto; padding: 12px; background: #16172A; border-radius: 10px; margin-bottom: 10px; }
.msg-user { text-align: right; margin-bottom: 10px; }
.msg-user span { background: #6C63FF; padding: 8px 12px; border-radius: 12px; font-size: 13px; display: inline-block; max-width: 80%; }
.msg-ai { text-align: left; margin-bottom: 10px; }
.msg-ai span { background: #1E2038; border: 1px solid #2A2D4A; padding: 8px 12px; border-radius: 12px; font-size: 13px; display: inline-block; max-width: 80%; white-space: pre-wrap; }
.chat-input { display: flex; gap: 8px; }
.chat-input input { flex: 1; }
.chat-input button { width: auto; padding: 12px 16px; margin: 0; }
h2 { font-size: 16px; margin-bottom: 12px; }
.api-card { background: #12132A; border: 1px solid #6C63FF55; border-radius: 14px; padding: 16px 20px; margin-bottom: 20px; }
.api-card label { color: #8B85FF; margin-bottom: 8px; }
.api-hint { font-size: 11px; color: #555577; margin-top: 6px; }
.error-box { background: #2A1020; border: 1px solid #FF4466; border-radius: 10px; padding: 12px; color: #FF8899; font-size: 13px; margin-bottom: 12px; display: none; }
</style>
</head>
<body>

<div class="header">
  <span style="font-size:28px">🎓</span>
  <div><h1>StudyMate</h1><p>SECRÉTAIRE IA POUR ÉTUDIANTS</p></div>
</div>

<div class="container">

  <div class="api-card">
    <label>🔑 CLÉ API OPENAI</label>
    <input type="password" id="apikey" placeholder="sk-..." />
    <div class="api-hint">Obtenez votre clé sur platform.openai.com → API Keys</div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="card">
    <label>VOTRE SUJET DE DEVOIR</label>
    <textarea id="sujet" placeholder="Collez ou tapez votre sujet ici..."></textarea>
    <label style="margin-top:12px">TYPE DE DEVOIR</label>
    <input id="type" value="exposé" placeholder="exposé, mémoire, thèse..."/>
    <button id="analyseBtn" onclick="analyser()">🚀 Analyser mon sujet</button>
  </div>

  <div class="loading" id="loading">⏳ L'IA analyse votre sujet...</div>

  <div class="result" id="result">
    <div class="card">
      <h2>📌 Compréhension du sujet</h2>
      <p id="summary" style="font-size:14px;line-height:1.7"></p>
      <div id="keywords" style="margin-top:12px"></div>
    </div>
    <div class="card">
      <h2>📋 Plan proposé</h2>
      <div id="plan"></div>
    </div>
    <div class="card">
      <h2>✅ Étapes de travail</h2>
      <div id="etapes"></div>
    </div>
    <div class="card">
      <h2>💬 Posez vos questions à l'IA</h2>
      <div class="chat-box" id="chatbox"></div>
      <div class="chat-input">
        <input id="chatinput" placeholder="Votre question..." onkeydown="if(event.key==='Enter')envoyer()"/>
        <button onclick="envoyer()">→</button>
      </div>
    </div>
  </div>

</div>

<script>
let sujetGlobal = "";
let chatHistory = [];

function showError(msg) {
  const box = document.getElementById("errorBox");
  box.textContent = "❌ " + msg;
  box.style.display = "block";
  setTimeout(() => box.style.display = "none", 8000);
}

async function callOpenAI(messages) {
  const apiKey = document.getElementById("apikey").value.trim();
  if (!apiKey) {
    showError("Veuillez entrer votre clé API OpenAI.");
    throw new Error("Clé API manquante");
  }

  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + apiKey
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      max_tokens: 1500,
      messages: messages
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || "Erreur API (code " + res.status + ")");
  }

  const data = await res.json();
  return data.choices?.[0]?.message?.content || "";
}

async function analyser() {
  const sujet = document.getElementById("sujet").value.trim();
  const type = document.getElementById("type").value.trim();
  if (!sujet) return alert("Veuillez entrer votre sujet !");

  sujetGlobal = sujet;
  const btn = document.getElementById("analyseBtn");
  btn.disabled = true;
  btn.textContent = "⏳ Analyse en cours...";
  document.getElementById("loading").style.display = "block";
  document.getElementById("result").style.display = "none";

  try {
    const raw = await callOpenAI([
      { role: "system", content: "Tu es StudyMate, un assistant IA pour étudiants. Réponds toujours en français." },
      { role: "user", content: `Analyse ce sujet de type "${type}": "${sujet}". Réponds UNIQUEMENT en JSON valide sans balises markdown:
{"summary":"résumé en 2 phrases","keywords":["mot1","mot2","mot3","mot4"],"plan":[{"titre":"I. Titre","desc":"description"},{"titre":"II. Titre","desc":"description"},{"titre":"III. Titre","desc":"description"}],"etapes":[{"titre":"Étape 1","desc":"action","duree":"X jours"},{"titre":"Étape 2","desc":"action","duree":"X jours"},{"titre":"Étape 3","desc":"action","duree":"X jours"}]}` }
    ]);

    const clean = raw.replace(/```json|```/g, "").trim();
    const json = JSON.parse(clean.match(/\{[\s\S]*\}/)[0]);

    document.getElementById("summary").textContent = json.summary;
    document.getElementById("keywords").innerHTML = json.keywords.map(k => `<span class="tag">${k}</span>`).join("");
    document.getElementById("plan").innerHTML = json.plan.map(p =>
      `<div class="step"><b style="color:#8B85FF">${p.titre}</b><p style="font-size:13px;color:#7B7D9E;margin-top:4px">${p.desc}</p></div>`
    ).join("");
    document.getElementById("etapes").innerHTML = json.etapes.map(e =>
      `<div class="step"><b>${e.titre}</b> <span style="color:#6C63FF;font-size:12px">⏱ ${e.duree}</span><p style="font-size:13px;color:#7B7D9E;margin-top:4px">${e.desc}</p></div>`
    ).join("");

    document.getElementById("loading").style.display = "none";
    document.getElementById("result").style.display = "block";
    chatHistory = [
      { role: "system", content: `Tu es StudyMate, secrétaire IA pour étudiants. Le sujet est: "${sujetGlobal}". Réponds en français, sois bienveillant et pratique.` }
    ];
    document.getElementById("chatbox").innerHTML = "";

  } catch(e) {
    document.getElementById("loading").style.display = "none";
    showError(e.message);
  }

  btn.disabled = false;
  btn.textContent = "🚀 Analyser mon sujet";
}

async function envoyer() {
  const input = document.getElementById("chatinput").value.trim();
  if (!input) return;

  const chatbox = document.getElementById("chatbox");
  chatHistory.push({ role: "user", content: input });
  chatbox.innerHTML += `<div class="msg-user"><span>${input}</span></div>`;
  document.getElementById("chatinput").value = "";
  chatbox.scrollTop = chatbox.scrollHeight;

  try {
    const reply = await callOpenAI(chatHistory);
    chatHistory.push({ role: "assistant", content: reply });
    chatbox.innerHTML += `<div class="msg-ai"><span>🎓 ${reply}</span></div>`;
  } catch(e) {
    chatbox.innerHTML += `<div class="msg-ai"><span>❌ ${e.message}</span></div>`;
  }

  chatbox.scrollTop = chatbox.scrollHeight;
}
</script>
</body>
</html>
