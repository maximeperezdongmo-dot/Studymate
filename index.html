<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyMate - Secrétaire IA pour étudiants</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
body { background: #0F0F1A; color: #E8E8F0; min-height: 100vh; }
.header { background: #16172A; padding: 16px 20px; border-bottom: 1px solid #2A2D4A; display: flex; align-items: center; gap: 10px; }
.header h1 { font-size: 20px; }
.header p { font-size: 11px; color: #7B7D9E; }
.container { padding: 20px; max-width: 700px; margin: 0 auto; }
.card { background: #1E2038; border: 1px solid #2A2D4A; border-radius: 14px; padding: 20px; margin-bottom: 20px; }
textarea, input { width: 100%; padding: 12px; background: #16172A; border: 1px solid #2A2D4A; border-radius: 10px; color: #E8E8F0; font-size: 14px; outline: none; font-family: sans-serif; box-sizing: border-box; }
textarea { min-height: 100px; resize: vertical; }
button { width: 100%; padding: 14px; background: #6C63FF; border: none; border-radius: 10px; color: white; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 12px; }
.tag { display: inline-block; padding: 4px 12px; border-radius: 20px; background: #6C63FF22; color: #8B85FF; font-size: 12px; margin: 4px; }
.step { padding: 12px; border: 1px solid #2A2D4A; border-radius: 10px; margin-bottom: 8px; }
.result { display: none; }
.loading { display: none; text-align: center; padding: 20px; color: #7B7D9E; }
label { display: block; font-size: 12px; color: #7B7D9E; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.5px; }
.chat-box { height: 300px; overflow-y: auto; padding: 12px; background: #16172A; border-radius: 10px; margin-bottom: 10px; }
.msg-user { text-align: right; margin-bottom: 10px; }
.msg-user span { background: #6C63FF; padding: 8px 12px; border-radius: 12px; font-size: 13px; display: inline-block; max-width: 80%; }
.msg-ai { text-align: left; margin-bottom: 10px; }
.msg-ai span { background: #1E2038; border: 1px solid #2A2D4A; padding: 8px 12px; border-radius: 12px; font-size: 13px; display: inline-block; max-width: 80%; }
.chat-input { display: flex; gap: 8px; }
.chat-input input { flex: 1; }
.chat-input button { width: auto; padding: 12px 16px; margin: 0; }
h2 { font-size: 16px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="header">
  <span style="font-size:28px">🎓</span>
  <div><h1>StudyMate</h1><p>SECRÉTAIRE IA POUR ÉTUDIANTS</p></div>
</div>
<div class="container">
  <div class="card">
    <label>VOTRE SUJET DE DEVOIR</label>
    <textarea id="sujet" placeholder="Collez ou tapez votre sujet ici..."></textarea>
    <label style="margin-top:12px">TYPE DE DEVOIR</label>
    <input id="type" value="exposé" placeholder="exposé, mémoire, thèse..."/>
    <button onclick="analyser()">🚀 Analyser mon sujet</button>
  </div>
  <div class="loading" id="loading">⏳ L'IA analyse votre sujet...</div>
  <div class="result" id="result">
    <div class="card">
      <h2>📌 Compréhension du sujet</h2>
      <p id="summary" style="font-size:14px;line-height:1.7;color:#E8E8F0"></p>
      <div id="keywords" style="margin-top:12px"></div>
    </div>
    <div class="card">
      <h2>📋 Plan proposé</h2>
      <div id="plan"></div>
    </div>
    <div class="card">
      <h2>✅ Étapes de travail</h2>
      <div id="etapes"></div>
    </div>
    <div class="card">
      <h2>💬 Posez vos questions à l'IA</h2>
      <div class="chat-box" id="chatbox"></div>
      <div class="chat-input">
        <input id="chatinput" placeholder="Votre question..." onkeydown="if(event.key==='Enter')envoyer()"/>
        <button onclick="envoyer()">→</button>
      </div>
    </div>
  </div>
</div>
<script>
let sujetGlobal = "";
let chatHistory = [];

async function callClaude(messages, system) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:1000, system, messages})
  });
  const data = await res.json();
  return data.content?.map(b => b.text||"").join("") || "";
}

async function analyser() {
  const sujet = document.getElementById("sujet").value.trim();
  const type = document.getElementById("type").value.trim();
  if (!sujet) return alert("Veuillez entrer votre sujet !");
  sujetGlobal = sujet;
  document.getElementById("loading").style.display = "block";
  document.getElementById("result").style.display = "none";
  const prompt = `Analyse ce sujet de devoir de type "${type}": "${sujet}". Réponds UNIQUEMENT en JSON valide:
{"summary":"résumé du sujet en 2 phrases","keywords":["mot1","mot2","mot3","mot4"],"plan":[{"titre":"I. Titre","desc":"description"},{"titre":"II. Titre","desc":"description"},{"titre":"III. Titre","desc":"description"}],"etapes":[{"titre":"Étape 1","desc":"action","duree":"X jours"},{"titre":"Étape 2","desc":"action","duree":"X jours"},{"titre":"Étape 3","desc":"action","duree":"X jours"}]}`;
  try {
    const raw = await callClaude([{role:"user",content:prompt}], "");
    const json = JSON.parse(raw.match(/\{[\s\S]*\}/)[0]);
    document.getElementById("summary").textContent = json.summary;
    document.getElementById("keywords").innerHTML = json.keywords.map(k=>`<span class="tag">${k}</span>`).join("");
    document.getElementById("plan").innerHTML = json.plan.map(p=>`<div class="step"><b style="color:#8B85FF">${p.titre}</b><p style="font-size:13px;color:#7B7D9E;margin-top:4px">${p.desc}</p></div>`).join("");
    document.getElementById("etapes").innerHTML = json.etapes.map(e=>`<div class="step"><b>${e.titre}</b> <span style="color:#6C63FF;font-size:12px">⏱ ${e.duree}</span><p style="font-size:13px;color:#7B7D9E;margin-top:4px">${e.desc}</p></div>`).join("");
    document.getElementById("loading").style.display = "none";
    document.getElementById("result").style.display = "block";
  } catch(e) {
    document.getElementById("loading").style.display = "none";
    alert("Erreur, réessayez.");
  }
}

async function envoyer() {
  const input = document.getElementById("chatinput").value.trim();
  if (!input) return;
  const chatbox = document.getElementById("chatbox");
  chatHistory.push({role:"user",content:input});
  chatbox.innerHTML += `<div class="msg-user"><span>${input}</span></div>`;
  document.getElementById("chatinput").value = "";
  chatbox.scrollTop = chatbox.scrollHeight;
  const system = `Tu es StudyMate, secrétaire IA pour étudiants. Le sujet du devoir est: "${sujetGlobal}". Guide l'étudiant en français, sois bienveillant et pratique.`;
  const reply = await callClaude(chatHistory, system);
  chatHistory.push({role:"assistant",content:reply});
  chatbox.innerHTML += `<div class="msg-ai"><span>🎓 ${reply}</span></div>`;
  chatbox.scrollTop = chatbox.scrollHeight;
}
</script>
</body>
</html>
